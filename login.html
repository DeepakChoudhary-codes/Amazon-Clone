<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- login box -->
        <div class="auth-container">
            <div class="outer-logo-box">     
                <a href="index.html">
                    <img src="images/amazon_logo - black.png" class="logo">
                </a>
            </div>

            <div class="outer-login-box">
                <div class="inner-login-box">
                    <div class="login-content">
                        <h1 id="heading">Sign in or create account</h1>
                        <form id="loginForm">
                            <p id="id">Enter mobile number or email</p>
                            <input type="text" class="input-field loginInput"><br><br>
                            <small class="error" id="inputError"></small>

                            <p id="id">Enter password</p>
                            <input type="password" class="input-field passwordInput">
                            <small class="error" id="passwordError"></small>
                            <input type="submit" value="Continue" class="submit-btn"><br><br>
                        </form>           
                        <p>By continuing, you agree to Amazon's <a href="#">Conditions of Use</a> and <a href="#">Privacy Notice</a>.</p>
                        <section id="help">
                            <a href="#">Need help?</a>
                        </section>
                        <hr>
                        <br>
                        <p>Do not have an account? <a href="register.html">Create account</a></p>
                    </div>
                </div>
            </div>
        </div>
        <br><br>
        <hr>
    
        <footer>
            <div class="footer">
                <div class="pages">
                    <a>Conditions of Use</a>
                    <a>Privacy Notice</a>
                    <a>Help</a>

                    <div class="copyright">
                    © 1996-2026, Amazon.com, Inc. or its affiliates
                    </div>
                </div>
            </div>
        </footer>

    <script src="script.js"></script>
</body>
</html>
